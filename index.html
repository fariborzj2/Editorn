<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorn - Modern Block-Based Editor Demo</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f9;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #editor-container {
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .editorn-container {
      padding: 20px;
    }
    .editorn-block-paragraph {
      margin-bottom: 1em;
      outline: none;
      min-height: 1.5em;
    }
    .editorn-block-paragraph[placeholder]:empty:before {
      content: attr(placeholder);
      color: #aaa;
    }
    #output-container {
      width: 100%;
      max-width: 800px;
      background: #222;
      color: #0f0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .editorn-block-header {
      margin: 1em 0 0.5em;
      font-weight: bold;
    }
    .editorn-block-list {
      padding-inline-start: 40px;
    }
    .editorn-block-list li {
      margin-bottom: 0.5em;
    }
    .editorn-block-quote {
      border-inline-start: 4px solid #ccc;
      padding-inline-start: 1em;
      margin: 1em 0;
      color: #666;
    }
    .editorn-quote-caption {
      font-size: 0.8em;
      color: #999;
      margin-top: 0.5em;
    }
    .editorn-block-divider hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 2em 0;
    }
  </style>
  <link rel="stylesheet" href="./src/plugins/inline-tools/inline-toolbar.css">
</head>
<body>
  <h1>Editorn v2 (Block-Based)</h1>
  <div id="editor-container"></div>
  <button id="save-btn" style="margin-bottom: 20px; padding: 10px 20px; cursor: pointer;">Save Output</button>
  <pre id="output-container" dir="ltr" style="text-align: left;">{}</pre>

  <script type="module">
    import Editorn from './src/index.js';

    let activeEditor = null;

    Editorn.init({
      selector: '#editor-container',
      height: 500,
      direction: 'rtl',
      lang: 'fa',

      plugins: [
        'inline-toolbar', 'fixed-toolbar', 'slash-menu',
        'bold', 'italic', 'underline', 'link',
        'header', 'list', 'quote', 'divider', 'image', 'embed', 'table', 'code'
      ],

      toolbar: "bold italic underline | link | header list quote divider | image embed table code",

      data: {
        blocks: [
          {
            type: 'paragraph',
            data: { text: 'سلام! این ویرایشگر جدید مبتنی بر بلوک با API تنظیمات مدرن است.' }
          }
        ]
      },

      onChange: (data) => {
        console.log('Content changed');
      },

      onReady: (editor) => {
        activeEditor = editor;
        console.log('Editor is ready and fully loaded!');
      }
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      if (activeEditor) {
         const data = activeEditor.save();
         document.getElementById('output-container').textContent = JSON.stringify(data, null, 2);
      }
    });
  </script>
</body>
</html>
